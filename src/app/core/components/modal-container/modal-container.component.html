<div *ngIf="config">

    <!-- Overlay -->
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

        <!-- Modal -->
        <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-lg relative">

            <!-- Dynamic Component -->
            <ng-container *ngComponentOutlet="config.component;
                            injector: createInjector(config.data)">
            </ng-container>
        </div>

    </div>

</div>
