<div class="mt-2 flex justify-end">
    <button class="px-4 py-2 rounded-lg bg-pink-600 text-white hover:bg-pink-700 disabled:opacity-50"
        (click)="viewForm()"> Create Course
    </button>
</div>


<div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-6 mr-4 ml-4 pb-6">

    <div *ngFor="let course of (courses$ | async)"
        class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition duration-300 pb-4 relative">

        <img [src]="course.image" class="w-full h-40 object-cover" />

        <div class="p-4">
            <h2 class="text-lg font-semibold mb-1 line-clamp-2">
                {{ course.title }}
            </h2>

            <p class="text-sm text-gray-600 mb-2 line-clamp-4">
                {{ course.description }}
            </p>
            <p class="text-sm text-gray-500 mb-2">
                by {{ course.instructor }}
            </p>

            <div class="flex items-center mb-2">
                <span class="text-yellow-500 text-sm">
                    {{ course.rating }} ★
                </span>
                <span class="text-xs text-gray-500 ml-2">
                    ({{ course.reviews }})
                </span>
            </div>

            <div class="flex flex-wrap gap-2 mb-3">
                <span *ngFor="let tag of course.tags.split(',')"
                    class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full">
                    {{ tag }}
                </span>
            </div>

            <div class="flex justify-between items-center">
                <span class="text-lg font-bold text-indigo-600">
                    ₹{{ course.price }}
                </span>

                <!-- (click)="viewCourse(course.id)" -->
                <!-- <button class="bg-indigo-600 text-white text-sm px-3 py-1.5 rounded-lg hover:bg-indigo-700">
                    View
                </button> -->
                <div class="relative">
                    <div class="absolute top-2 right-2 flex gap-2">

                        <!-- Create -->
                        <button (click)="viewForm()"
                            class="bg-white/90 p-2 rounded-full shadow shadow-gray-500 hover:bg-green-100 transition"
                            title="Update Course">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-600" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4" />
                            </svg>
                        </button>

                        <!-- View -->
                        <button (click)="viewCourse(course.id)"
                            class="bg-white/90 p-2 rounded-full shadow shadow-gray-500 hover:bg-blue-100 transition"
                            title="View">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-600" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5
                   c4.477 0 8.268 2.943 9.542 7
                   -1.274 4.057-5.065 7-9.542 7
                   -4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>

                        <!-- Delete -->
                        <button (click)="deleteCourse(course.id)"
                            class="bg-white/90 p-2 rounded-full shadow shadow-gray-500 hover:bg-red-100 transition"
                            title="Delete">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-600" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>

                    </div>
                </div>
            </div>

        </div>
    </div>

</div>
<!-- <modal-container></modal-container> -->
<create-course></create-course>
@if (loading$ | async) {<loading-spinner></loading-spinner>}
